[source::...ta-mincho-praznikov*.log*]
SHOULD_LINEMERGE = true
sourcetype = taminchopraznikov:log

[source::...ta_mincho_praznikov*.log*]
SHOULD_LINEMERGE = true
sourcetype = taminchopraznikov:log

[openweathermap:json]
KV_MODE = none
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

# 2. COORDINATES
EXTRACT-lon = "lon":(?<lon>[\d\.-]+)
EXTRACT-lat = "lat":(?<lat>[\d\.-]+)

# 3. WEATHER ARRAY (Full extraction)
EXTRACT-weather_id = "id":(?<weather_id>\d+)
EXTRACT-weather_main = "main":"(?<weather_main>[^"]+)"
EXTRACT-weather_desc = "description":"(?<weather_desc>[^"]+)"
EXTRACT-weather_icon = "icon":"(?<weather_icon>[^"]+)"

# 4. BASE & VISIBILITY
EXTRACT-base = "base":"(?<base>[^"]+)"
EXTRACT-visibility = "visibility":(?<visibility>\d+)

# 5. MAIN METRICS (Temperature, Pressure, Humidity)
EXTRACT-temp = "temp":(?<temp>[\d\.-]+)
EXTRACT-feels_like = "feels_like":(?<feels_like>[\d\.-]+)
EXTRACT-temp_min = "temp_min":(?<temp_min>[\d\.-]+)
EXTRACT-temp_max = "temp_max":(?<temp_max>[\d\.-]+)
EXTRACT-pressure = "pressure":(?<pressure>\d+)
EXTRACT-humidity = "humidity":(?<humidity>\d+)
EXTRACT-sea_level = "sea_level":(?<sea_level>\d+)
EXTRACT-grnd_level = "grnd_level":(?<grnd_level>\d+)

# 6. WIND DATA
EXTRACT-wind_speed = "speed":(?<wind_speed>[\d\.-]+)
EXTRACT-wind_deg = "deg":(?<wind_deg>\d+)
EXTRACT-wind_gust = "gust":(?<wind_gust>[\d\.-]+)

# 7. CLOUDS
EXTRACT-clouds_all = "clouds":{"all":(?<clouds_all>\d+)}

# 8. SYSTEM DATA (sys)
EXTRACT-sys_type = "sys":{.*?"type":(?<sys_type>\d+)
EXTRACT-sys_id = "sys":{.*?"id":(?<sys_id>\d+)
EXTRACT-country = "country":"(?<country>[^"]+)"
EXTRACT-sunrise = "sunrise":(?<sunrise>\d+)
EXTRACT-sunset = "sunset":(?<sunset>\d+)

# 9. ROOT LEVEL METADATA
EXTRACT-dt = "dt":(?<dt>\d+)
EXTRACT-timezone = "timezone":(?<timezone>[\d\.-]+)
EXTRACT-city_id = "id":(?<city_id>\d+),"name"
EXTRACT-city_name = "name":"(?<city_name>[^"]+)"
EXTRACT-cod = "cod":(?<cod>\d+)

# 10. TIMESTAMPING
TIME_PREFIX = \"dt\":
TIME_FORMAT = %s
